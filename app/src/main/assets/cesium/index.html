<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocationMobile</title>
    <link href="https://unpkg.com/cesium@1.112/Build/Cesium/Widgets/widgets.css"
          rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* ── 底部按钮栏：三个按钮水平并排 ── */
        .control-panel {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        .btn {
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: rgba(20, 20, 40, 0.75);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 22px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn.tracking-on {
            background: rgba(220, 50, 80, 0.75);
            border-color: rgba(255,100,100,0.4);
        }

        /* ── 左上角信息框 ── */
        .info-box {
            position: absolute;
            top: 70px;
            left: 16px;
            background: rgba(10,10,25,0.82);
            color: #e8eaf0;
            padding: 11px 15px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.7;
            max-width: 230px;
            z-index: 1000;
            display: none;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
        }
        .info-box.show { display: block; }

        /* ── 图层按钮（左上角入口） ── */
        .layer-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            background: rgba(10,10,25,0.82);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 22px;
            color: #e8eaf0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            touch-action: manipulation;
            transition: background 0.2s;
            user-select: none;
        }
        .layer-btn:active { background: rgba(40,40,70,0.9); }
        .layer-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── 图层选择弹出面板 ── */
        .layer-panel {
            position: absolute;
            top: 58px;
            left: 16px;
            z-index: 1002;
            background: rgba(10,10,28,0.92);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 190px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: fadeDown 0.18s ease;
        }
        .layer-panel.show { display: flex; }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 面板内每个地图选项 */
        .layer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 13px;
            border-radius: 9px;
            cursor: pointer;
            color: #c8cad8;
            font-size: 13.5px;
            font-weight: 500;
            transition: background 0.15s;
            touch-action: manipulation;
        }
        .layer-option:hover,
        .layer-option:active { background: rgba(255,255,255,0.08); }
        /* 激活状态 */
        .layer-option.active {
            background: rgba(56, 189, 248, 0.15);
            color: #7dd3fc;
        }
        .layer-option.active .opt-icon { opacity: 1; }
        .layer-option .opt-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            opacity: 0.7;
        }
        .layer-option .opt-label { flex: 1; }
        .layer-option .opt-check {
            font-size: 13px;
            color: #38bdf8;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .layer-option.active .opt-check { opacity: 1; }

        /* 面板分割线 */
        .layer-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 2px 4px;
        }

        /* ── 加载提示 ── */
        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #e8eaf0;
            font-size: 16px;
            z-index: 999;
            background: rgba(10,10,28,0.85);
            padding: 18px 36px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">LocationMobile 加载中…</div>
<div id="cesiumContainer"></div>

<!-- 左上角信息框 -->
<div class="info-box" id="infoBox"></div>

<!-- 图层入口按钮 -->
<button class="layer-btn" id="layerBtn" onclick="toggleLayerPanel()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
    </svg>
    图层
</button>

<!-- 图层选择面板（默认隐藏） -->
<div class="layer-panel" id="layerPanel">
    <div class="layer-option" id="opt-satellite" onclick="switchMap('satellite')">
        <span class="opt-icon">🛰️</span>
        <span class="opt-label">卫星影像</span>
        <span class="opt-check">✓</span>
    </div>
    <div class="layer-option" id="opt-street" onclick="switchMap('street')">
        <span class="opt-icon">🗺️</span>
        <span class="opt-label">街道地图</span>
        <span class="opt-check">✓</span>
    </div>
    <div class="layer-divider"></div>
    <!-- ★ 默认选中天地图 -->
    <div class="layer-option active" id="opt-tdt" onclick="switchMap('tdt')">
        <span class="opt-icon">🌏</span>
        <span class="opt-label">天地图（备用）</span>
        <span class="opt-check">✓</span>
    </div>
</div>

<!-- 底部三按钮并排 -->
<div class="control-panel">
    <button class="btn" onclick="requestLocation()">📍 获取位置</button>
    <button class="btn" id="trackBtn" onclick="toggleTracking()">🎯 开始跟踪</button>
    <button class="btn" onclick="clearMarkers()">🗑️ 清除标记</button>
</div>

<script src="https://unpkg.com/cesium@1.112/Build/Cesium/Cesium.js"></script>
<script>
    // ── Token 配置 ─────────────────────────────────────────
    // 默认 Token（发布时请移除或置空）
    let CESIUM_ION_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlOTQ2M2Q5Zi1hNTIwLTRhODQtOTBhZS1lYzllOGFkYzQyYTUiLCJpZCI6Mzg2MTE1LCJpYXQiOjE3NzIxOTAwMjd9.JdlVK8FpTJd6SfQC-VnV30kUn77L1xCBL3ruBHUR3mE';
    let TDT_TOKEN = '2550d947faf678cd19951d530bf273d8';

    // 立即设置默认 Token
    Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
    console.log('使用默认 Cesium Ion Token');

    // 页面加载完成后，尝试从 Android 获取本地配置的 Token（覆盖默认 Token）
    function initTokens() {
        setTimeout(function() {
            try {
                if (typeof Android !== 'undefined' && Android.getCesiumIonToken) {
                    const cesiumToken = Android.getCesiumIonToken();
                    if (cesiumToken && cesiumToken !== '') {
                        CESIUM_ION_TOKEN = cesiumToken;
                        Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
                        console.log('已更新为本地 Cesium Ion Token');
                    }

                    const tdtToken = Android.getTiandituToken();
                    if (tdtToken && tdtToken !== '') {
                        TDT_TOKEN = tdtToken;
                        console.log('已更新为本地天地图 Token');
                    }
                }
            } catch (e) {
                console.log('获取本地 Token 失败，使用默认配置');
            }
        }, 500); // 延迟 500ms 确保 Android 接口已准备好
    }

    // 延迟执行初始化
    initTokens();

    // ── 瓦片源工厂函数 ────────────────────────────────────

    /** 卫星影像：Esri World Imagery */
    function createSatelliteProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            credit: 'Esri World Imagery',
            maximumLevel: 19
        });
    }

    /** 街道地图：OSM */
    function createStreetProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: 'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
            subdomains: ['1', '2', '3', '4'],
            credit: '高德地图',
            maximumLevel: 18
        });
    }

    /** 天地图卫星影像 */
    function createTdtProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: `https://t{s}.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TOKEN}`,
            subdomains: ['0','1','2','3','4','5','6','7'],
            credit: '天地图',
            maximumLevel: 18
        });
    }

    /** 天地图标注叠加层 */
    function createTdtLabelProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: `https://t{s}.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TOKEN}`,
            subdomains: ['0','1','2','3','4','5','6','7'],
            credit: '天地图标注',
            maximumLevel: 18
        });
    }

    // ── 生成"当前位置"显眼图标的 Canvas DataURL ──────────
    // 使用 Canvas 绘制一个带外圈光晕的导航箭头图标
    function createCurrentLocationIcon() {
        const size = 64;
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const cx = size / 2;
        const cy = size / 2;

        // 外圈光晕（半透明蓝色）
        const grd = ctx.createRadialGradient(cx, cy, 8, cx, cy, 30);
        grd.addColorStop(0, 'rgba(56,189,248,0.45)');
        grd.addColorStop(1, 'rgba(56,189,248,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(cx, cy, 30, 0, Math.PI * 2);
        ctx.fill();

        // 白色描边圆底
        ctx.beginPath();
        ctx.arc(cx, cy, 14, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();

        // 内圆（主色）
        ctx.beginPath();
        ctx.arc(cx, cy, 11, 0, Math.PI * 2);
        ctx.fillStyle = '#0ea5e9'; // sky-500
        ctx.fill();

        // 中心白点
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();

        return canvas.toDataURL();
    }

    // 预生成图标 DataURL
    const CURRENT_LOC_ICON = createCurrentLocationIcon();

    // ── ★ 默认使用天地图底图（Token 为空时回退到 OSM 街道图）──
    const defaultMapType = (TDT_TOKEN && TDT_TOKEN !== '') ? 'tdt' : 'street';

    // ── 初始化 Viewer（不传 imageryProvider，避免与后续图层管理冲突）──
    const viewer = new Cesium.Viewer('cesiumContainer', {
        baseLayerPicker: false,
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        timeline: false,
        animation: false,
        fullscreenButton: false,
        vrButton: false,
        geocoder: false,
        homeButton: true,
        infoBox: true,
        sceneModePicker: true,
        selectionIndicator: true,
        navigationHelpButton: false,
        navigationInstructionsInitiallyVisible: false
    });
    viewer.cesiumWidget.creditContainer.style.display = 'none';

    // ── 初始化完成后，清除 Cesium 自动创建的默认图层，再统一添加 ──
    // 这样可以确保影像层和标注层的叠加顺序完全受控
    viewer.imageryLayers.removeAll();
    if (defaultMapType === 'tdt') {
        viewer.imageryLayers.addImageryProvider(createTdtProvider());
        viewer.imageryLayers.addImageryProvider(createTdtLabelProvider());
    } else {
        viewer.imageryLayers.addImageryProvider(createStreetProvider());
    }

    // ── 同步初始图层面板高亮状态 ─────────────────────────
    let currentMap = defaultMapType;
    if (defaultMapType !== 'tdt') {
        // Token 未填，回退 OSM 街道图，同步 UI 高亮
        document.getElementById('opt-tdt').classList.remove('active');
        document.getElementById('opt-street').classList.add('active');
    }

    // ── 图层切换逻辑 ─────────────────────────────────────
    function switchMap(mapType) {
        closeLayerPanel();

        if (mapType === currentMap) return;

        // 天地图需要 Token
        if (mapType === 'tdt' && (!TDT_TOKEN || TDT_TOKEN === '')) {
            showInfo('⚠️ 请先在 index.html 中填入天地图 Token', 4000);
            return;
        }

        // 替换底图图层
        viewer.imageryLayers.removeAll();
        if (mapType === 'satellite') {
            viewer.imageryLayers.addImageryProvider(createSatelliteProvider());
        } else if (mapType === 'street') {
            viewer.imageryLayers.addImageryProvider(createStreetProvider());
        } else if (mapType === 'tdt') {
            viewer.imageryLayers.addImageryProvider(createTdtProvider());
            viewer.imageryLayers.addImageryProvider(createTdtLabelProvider());
        }

        // 更新选中样式
        ['satellite','street','tdt'].forEach(id => {
            document.getElementById(`opt-${id}`)
                .classList.toggle('active', id === mapType);
        });

        currentMap = mapType;
        const names = { satellite:'卫星影像', street:'街道地图', tdt:'天地图' };
        showInfo(`已切换至 ${names[mapType]}`, 1800);
    }

    // ── 图层面板开关 ──────────────────────────────────────
    let layerPanelOpen = false;

    function toggleLayerPanel() {
        layerPanelOpen = !layerPanelOpen;
        document.getElementById('layerPanel')
            .classList.toggle('show', layerPanelOpen);
    }

    function closeLayerPanel() {
        layerPanelOpen = false;
        document.getElementById('layerPanel').classList.remove('show');
    }

    // 点击地图其他区域时关闭面板
    document.getElementById('cesiumContainer').addEventListener('click', closeLayerPanel);

    // ── 定位相关变量 ──────────────────────────────────────
    let locationMarker  = null;  // 单次定位标记 / 持续跟踪最新点（显眼图标）
    let historyMarkers  = [];    // 持续跟踪历史点（小点，无标签）
    let locationHistory = [];    // 坐标数组（用于画轨迹线）
    let trackLine       = null;
    let isTracking      = false;

    // 加载完成
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        logToAndroid('LocationMobile地图加载完成');
    }, 2000);

    // 初始视角：中国上空
    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(105.0, 35.0, 5000000.0),
        orientation: { heading: 0.0, pitch: Cesium.Math.toRadians(-90.0), roll: 0.0 }
    });

    // ── 按钮功能 ──────────────────────────────────────────

    function requestLocation() {
        showInfo('正在获取位置…');
        if (typeof Android !== 'undefined' && Android.getLocation) {
            Android.getLocation();
        } else {
            showInfo('请在 LocationMobile 应用中使用此功能', 3000);
        }
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (!isTracking) {
            if (typeof Android !== 'undefined' && Android.startTracking) {
                Android.startTracking();
                isTracking = true;
                btn.textContent = '⏸️ 停止跟踪';
                btn.classList.add('tracking-on');
                showInfo('开始位置跟踪', 2000);
            }
        } else {
            if (typeof Android !== 'undefined' && Android.stopTracking) {
                Android.stopTracking();
                isTracking = false;
                btn.textContent = '🎯 开始跟踪';
                btn.classList.remove('tracking-on');
                showInfo('停止位置跟踪', 2000);
            }
        }
    }

    function clearMarkers() {
        // 移除单次/最新位置标记
        if (locationMarker) { viewer.entities.remove(locationMarker); locationMarker = null; }
        // 移除所有历史轨迹点
        historyMarkers.forEach(e => viewer.entities.remove(e));
        historyMarkers = [];
        // 移除轨迹线
        if (trackLine) { viewer.entities.remove(trackLine); trackLine = null; }
        locationHistory = [];
        showInfo('已清除所有标记', 2000);
        logToAndroid('清除所有标记');
    }

    // ── 位置更新与飞行 ────────────────────────────────────

    /**
     * 由 Android 原生调用：更新位置标记并飞行
     * @param {number} longitude
     * @param {number} latitude
     * @param {number} altitude
     * @param {number} accuracy
     * @param {string} updateType  'single' | 'continuous'
     */
    function flyToLocation(longitude, latitude, altitude, accuracy = 0, updateType = 'single') {
        console.log(`位置更新: ${longitude}, ${latitude}, alt=${altitude}, acc=${accuracy}, type=${updateType}`);

        const position = Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude);
        locationHistory.push(position);

        if (updateType === 'single') {
            // ── 单次定位：移除旧标记，添加新标记（红色点 + 标签）──
            if (locationMarker) { viewer.entities.remove(locationMarker); }

            locationMarker = viewer.entities.add({
                name: '当前位置',
                position: position,
                point: {
                    pixelSize: 16,
                    color: Cesium.Color.fromCssColorString('#ff3b5c'),
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 3
                },
                ellipse: accuracy > 0 ? {
                    semiMinorAxis: accuracy,
                    semiMajorAxis: accuracy,
                    material: Cesium.Color.fromCssColorString('#ff3b5c').withAlpha(0.12),
                    outline: true,
                    outlineColor: Cesium.Color.fromCssColorString('#ff3b5c').withAlpha(0.5),
                    outlineWidth: 2
                } : undefined,
                label: {
                    text: '我的位置',
                    font: '13pt sans-serif',
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    outlineWidth: 2,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -22)
                },
                description: `<div style="padding:10px;font-family:sans-serif;font-size:13px;line-height:1.8;">
                    <p><strong>经度：</strong>${longitude.toFixed(6)}</p>
                    <p><strong>纬度：</strong>${latitude.toFixed(6)}</p>
                    <p><strong>海拔：</strong>${altitude.toFixed(1)} 米</p>
                    ${accuracy > 0 ? `<p><strong>精度：</strong>±${accuracy.toFixed(0)} 米</p>` : ''}
                    <p><strong>时间：</strong>${new Date().toLocaleString('zh-CN')}</p>
                </div>`
            });

        } else {
            // ── 持续跟踪模式 ─────────────────────────────────

            // 1. 将旧的"当前位置"最新点降级为普通历史小点（移除标签和显眼图标）
            if (locationMarker) {
                viewer.entities.remove(locationMarker);
                // 在上一个位置添加普通历史点（无标签）
                const prevPos = locationHistory[locationHistory.length - 2];
                if (prevPos) {
                    const hist = viewer.entities.add({
                        position: prevPos,
                        point: {
                            pixelSize: 8,
                            color: Cesium.Color.fromCssColorString('#38bdf8').withAlpha(0.8),
                            outlineColor: Cesium.Color.WHITE,
                            outlineWidth: 1.5
                        }
                    });
                    historyMarkers.push(hist);
                }
            }

            // 2. 添加新的"当前位置"显眼图标（billboard + 标签，仅最新点有）
            locationMarker = viewer.entities.add({
                name: '当前位置',
                position: position,
                // ★ 使用自定义 billboard 替代普通 point，更显眼
                billboard: {
                    image: CURRENT_LOC_ICON,
                    width: 56,
                    height: 56,
                    verticalOrigin: Cesium.VerticalOrigin.CENTER,
                    horizontalOrigin: Cesium.HorizontalOrigin.CENTER,
                    // 轻微缩放脉冲动画：通过 scaleByDistance 模拟视觉呼吸感
                    scaleByDistance: new Cesium.NearFarScalar(100, 1.3, 50000, 0.8)
                },
                // 精度圈（蓝色）
                ellipse: accuracy > 0 ? {
                    semiMinorAxis: accuracy,
                    semiMajorAxis: accuracy,
                    material: Cesium.Color.fromCssColorString('#38bdf8').withAlpha(0.12),
                    outline: true,
                    outlineColor: Cesium.Color.fromCssColorString('#38bdf8').withAlpha(0.5),
                    outlineWidth: 2
                } : undefined,
                // ★ 只有最新点才有"当前位置"标签
                label: {
                    text: '当前位置',
                    font: 'bold 13pt sans-serif',
                    fillColor: Cesium.Color.fromCssColorString('#38bdf8'),
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    outlineColor: Cesium.Color.fromCssColorString('#0c1a2e'),
                    outlineWidth: 3,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -36)
                },
                description: `<div style="padding:10px;font-family:sans-serif;font-size:13px;line-height:1.8;">
                    <p><strong>经度：</strong>${longitude.toFixed(6)}</p>
                    <p><strong>纬度：</strong>${latitude.toFixed(6)}</p>
                    <p><strong>海拔：</strong>${altitude.toFixed(1)} 米</p>
                    ${accuracy > 0 ? `<p><strong>精度：</strong>±${accuracy.toFixed(0)} 米</p>` : ''}
                    <p><strong>时间：</strong>${new Date().toLocaleString('zh-CN')}</p>
                </div>`
            });

            // 3. 更新轨迹线
            if (locationHistory.length > 1) {
                updateTrackLine();
            }
        }

        // ★ 近乎垂直俯视飞行
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(
                longitude, latitude,
                altitude + (updateType === 'single' ? 500 : 300)
            ),
            orientation: {
                heading: Cesium.Math.toRadians(0.0),
                pitch:   Cesium.Math.toRadians(-88.0),
                roll:    0.0
            },
            duration: updateType === 'single' ? 2.5 : 1.0
        });

        if (updateType === 'single') {
            showInfo(
                `📍 定位成功<br>` +
                `经度：${longitude.toFixed(5)}<br>` +
                `纬度：${latitude.toFixed(5)}<br>` +
                `精度：±${accuracy.toFixed(0)} 米`,
                4000
            );
        }
    }

    /** 更新轨迹线 */
    function updateTrackLine() {
        if (trackLine) { viewer.entities.remove(trackLine); }
        trackLine = viewer.entities.add({
            name: '移动轨迹',
            polyline: {
                positions: locationHistory,
                width: 4,
                material: new Cesium.PolylineGlowMaterialProperty({
                    glowPower: 0.3,
                    color: Cesium.Color.fromCssColorString('#38bdf8')
                })
            }
        });
    }

    /** 信息框 */
    function showInfo(message, duration = 0) {
        const box = document.getElementById('infoBox');
        box.innerHTML = message;
        box.classList.add('show');
        if (duration > 0) {
            setTimeout(() => box.classList.remove('show'), duration);
        }
    }

    /** Android 日志 */
    function logToAndroid(message) {
        if (typeof Android !== 'undefined' && Android.log) { Android.log(message); }
        console.log(message);
    }

    console.log('LocationMobile地图初始化完成');
    logToAndroid('LocationMobile地图初始化完成');
</script>
</body>
</html>
