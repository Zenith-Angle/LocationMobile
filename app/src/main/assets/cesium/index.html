<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocationMobile</title>
    <link href="https://unpkg.com/cesium@1.112/Build/Cesium/Widgets/widgets.css"
          rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* ── 底部按钮栏：三个按钮水平并排 ── */
        .control-panel {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            gap: 10px;
        }
        .btn {
            padding: 11px 18px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: rgba(20, 20, 40, 0.75);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 22px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            transition: background 0.2s, transform 0.1s;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .btn:active { transform: scale(0.94); }
        .btn.tracking-on {
            background: rgba(220, 50, 80, 0.75);
            border-color: rgba(255,100,100,0.4);
        }

        /* ── 左上角信息框 ── */
        .info-box {
            position: absolute;
            top: 70px;
            left: 16px;
            background: rgba(10,10,25,0.82);
            color: #e8eaf0;
            padding: 11px 15px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.7;
            max-width: 230px;
            z-index: 1000;
            display: none;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
        }
        .info-box.show { display: block; }

        /* ── 左下角定位数据面板 ── */
        .location-panel {
            position: absolute;
            left: 16px;
            bottom: 92px;
            z-index: 1000;
            min-width: 238px;
            max-width: 280px;
            padding: 12px 14px;
            border-radius: 12px;
            color: #e8eaf0;
            background: rgba(10, 10, 25, 0.84);
            border: 1px solid rgba(255,255,255,0.13);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.34);
            display: none;
            overflow: hidden;
        }
        .location-panel.show { display: block; }
        .location-panel.collapsed {
            min-width: 160px;
            max-width: 190px;
            padding-bottom: 10px;
        }
        .location-title {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 0;
            background: transparent;
            padding: 0;
            font-size: 12px;
            color: #93c5fd;
            font-weight: 700;
            margin-bottom: 8px;
            cursor: pointer;
            touch-action: manipulation;
            text-align: left;
        }
        .location-title::after {
            content: '收起';
            color: rgba(232,234,240,0.66);
            font-size: 11px;
            font-weight: 600;
        }
        .location-panel.collapsed .location-title {
            margin-bottom: 0;
        }
        .location-panel.collapsed .location-title::after {
            content: '展开';
        }
        .location-panel.collapsed .location-grid {
            display: none;
        }
        .location-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            row-gap: 5px;
            column-gap: 12px;
            font-size: 12px;
            line-height: 1.35;
        }
        .location-label { color: rgba(232,234,240,0.68); }
        .location-value {
            color: #f8fafc;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        /* ── 右侧中部：轨迹节点显示开关 ── */
        .track-node-panel {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1003;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(10,10,25,0.84);
            border: 1px solid rgba(255,255,255,0.14);
            color: #e8eaf0;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.35);
            user-select: none;
        }
        .track-node-title {
            font-size: 12px;
            line-height: 1;
        }
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            display: inline-block;
        }
        .switch input { display: none; }
        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: 0.2s;
        }
        .slider:before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            top: 3px;
            background-color: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        .switch input:checked + .slider {
            background-color: rgba(56, 189, 248, 0.85);
        }
        .switch input:checked + .slider:before {
            transform: translateX(20px);
        }

        /* ── 图层按钮（左上角入口） ── */
        .layer-btn {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 9px 16px;
            background: rgba(10,10,25,0.82);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 22px;
            color: #e8eaf0;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0,0,0,0.4);
            touch-action: manipulation;
            transition: background 0.2s;
            user-select: none;
        }
        .layer-btn:active { background: rgba(40,40,70,0.9); }
        .layer-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── 图层选择弹出面板 ── */
        .layer-panel {
            position: absolute;
            top: 58px;
            left: 16px;
            z-index: 1002;
            background: rgba(10,10,28,0.92);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 14px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 190px;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            animation: fadeDown 0.18s ease;
        }
        .layer-panel.show { display: flex; }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 面板内每个地图选项 */
        .layer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 13px;
            border-radius: 9px;
            cursor: pointer;
            color: #c8cad8;
            font-size: 13.5px;
            font-weight: 500;
            transition: background 0.15s;
            touch-action: manipulation;
        }
        .layer-option:hover,
        .layer-option:active { background: rgba(255,255,255,0.08); }
        /* 激活状态 */
        .layer-option.active {
            background: rgba(56, 189, 248, 0.15);
            color: #7dd3fc;
        }
        .layer-option.active .opt-icon { opacity: 1; }
        .layer-option .opt-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
            opacity: 0.7;
        }
        .layer-option .opt-label { flex: 1; }
        .layer-option .opt-check {
            font-size: 13px;
            color: #38bdf8;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .layer-option.active .opt-check { opacity: 1; }

        /* 面板分割线 */
        .layer-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 2px 4px;
        }

        /* ── 加载提示 ── */
        .loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            color: #e8eaf0;
            font-size: 16px;
            z-index: 999;
            background: rgba(10,10,28,0.85);
            padding: 18px 36px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            letter-spacing: 0.5px;
        }

        @media (max-width: 640px) {
            .control-panel {
                width: calc(100% - 24px);
                bottom: 18px;
                gap: 7px;
            }
            .btn {
                flex: 1;
                padding: 10px 8px;
                font-size: 12px;
            }
            .location-panel {
                left: 12px;
                right: 12px;
                bottom: 76px;
                min-width: 0;
                max-width: none;
            }
            .layer-panel {
                max-width: calc(100% - 32px);
            }
        }
    </style>
</head>
<body>

<div class="loading" id="loading">LocationMobile 加载中…</div>
<div id="cesiumContainer"></div>

<!-- 左上角信息框 -->
<div class="info-box" id="infoBox"></div>

<!-- 左下角定位数据 -->
<div class="location-panel" id="locationPanel">
    <button class="location-title" onclick="toggleLocationPanel()">当前位置</button>
    <div class="location-grid">
        <span class="location-label">经度</span><span class="location-value" id="valueLongitude">--</span>
        <span class="location-label">纬度</span><span class="location-value" id="valueLatitude">--</span>
        <span class="location-label">GPS 高程</span><span class="location-value" id="valueGpsAltitude">--</span>
        <span class="location-label">气压高程</span><span class="location-value" id="valueBarometerAltitude">--</span>
        <span class="location-label">精度</span><span class="location-value" id="valueAccuracy">--</span>
        <span class="location-label">速度</span><span class="location-value" id="valueSpeed">--</span>
        <span class="location-label">时间</span><span class="location-value" id="valueTimestamp">--</span>
    </div>
</div>

<!-- 图层入口按钮 -->
<button class="layer-btn" id="layerBtn" onclick="toggleLayerPanel()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 17 12 22 22 17"/>
        <polyline points="2 12 12 17 22 12"/>
    </svg>
    图层
</button>

<!-- 图层选择面板（默认隐藏） -->
<div class="layer-panel" id="layerPanel">
    <div class="layer-option" id="opt-satellite" onclick="switchMap('satellite')">
        <span class="opt-icon">🛰️</span>
        <span class="opt-label">卫星影像</span>
        <span class="opt-check">✓</span>
    </div>
    <div class="layer-option" id="opt-street" onclick="switchMap('street')">
        <span class="opt-icon">🗺️</span>
        <span class="opt-label">街道地图</span>
        <span class="opt-check">✓</span>
    </div>
    <div class="layer-divider"></div>
    <!-- ★ 默认选中天地图 -->
    <div class="layer-option active" id="opt-tdt" onclick="switchMap('tdt')">
        <span class="opt-icon">🌏</span>
        <span class="opt-label">天地图（备用）</span>
        <span class="opt-check">✓</span>
    </div>
</div>

<div class="track-node-panel" id="trackNodePanel">
    <span class="track-node-title">轨迹节点</span>
    <label class="switch">
        <input type="checkbox" id="trackNodeSwitch" checked onchange="toggleTrackNodeVisibility()">
        <span class="slider"></span>
    </label>
</div>

<!-- 底部三按钮并排 -->
<div class="control-panel">
    <button class="btn" onclick="requestLocation()">📍 获取位置</button>
    <button class="btn" id="trackBtn" onclick="toggleTracking()">🎯 开始跟踪</button>
    <button class="btn" onclick="clearMarkers()">🗑️ 清除标记</button>
</div>

<script src="https://unpkg.com/cesium@1.112/Build/Cesium/Cesium.js"></script>
<script>
    // ── Token 配置 ─────────────────────────────────────────
    // Token 由 Android 原生侧通过 applyNativeTokens 注入
    let CESIUM_ION_TOKEN = '';
    let TDT_TOKEN = '';

    // ── 瓦片源工厂函数 ────────────────────────────────────

    /** 卫星影像：Esri World Imagery */
    function createSatelliteProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            credit: 'Esri World Imagery',
            maximumLevel: 19
        });
    }

    /** 街道地图：OSM */
    function createStreetProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: 'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
            subdomains: ['1', '2', '3', '4'],
            credit: '高德地图',
            maximumLevel: 18
        });
    }

    /** 天地图卫星影像 */
    function createTdtProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: `https://t{s}.tianditu.gov.cn/img_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=img&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TOKEN}`,
            subdomains: ['0','1','2','3','4','5','6','7'],
            credit: '天地图',
            maximumLevel: 18
        });
    }

    /** 天地图标注叠加层 */
    function createTdtLabelProvider() {
        return new Cesium.UrlTemplateImageryProvider({
            url: `https://t{s}.tianditu.gov.cn/cia_w/wmts?SERVICE=WMTS&REQUEST=GetTile&VERSION=1.0.0&LAYER=cia&STYLE=default&TILEMATRIXSET=w&FORMAT=tiles&TILEMATRIX={z}&TILEROW={y}&TILECOL={x}&tk=${TDT_TOKEN}`,
            subdomains: ['0','1','2','3','4','5','6','7'],
            credit: '天地图标注',
            maximumLevel: 18
        });
    }

    // ── ★ 默认使用天地图底图（Token 为空时回退到 OSM 街道图）──
    const defaultMapType = (TDT_TOKEN && TDT_TOKEN !== '') ? 'tdt' : 'street';

    // ── 初始化 Viewer（不传 imageryProvider，避免与后续图层管理冲突）──
    const viewer = new Cesium.Viewer('cesiumContainer', {
        baseLayerPicker: false,
        terrainProvider: new Cesium.EllipsoidTerrainProvider(),
        timeline: false,
        animation: false,
        fullscreenButton: false,
        vrButton: false,
        geocoder: false,
        homeButton: true,
        infoBox: false,
        sceneModePicker: true,
        selectionIndicator: false,
        navigationHelpButton: false,
        navigationInstructionsInitiallyVisible: false
    });
    viewer.cesiumWidget.creditContainer.style.display = 'none';

    // 模拟器下显式支持鼠标滚轮缩放
    const cameraController = viewer.scene.screenSpaceCameraController;
    cameraController.enableZoom = true;
    // 禁用 Cesium 默认滚轮缩放，改为手动处理，避免双重缩放
    cameraController.zoomEventTypes = [Cesium.CameraEventType.PINCH];
    viewer.scene.canvas.addEventListener('wheel', function(event) {
        event.preventDefault();
        const cameraHeight = viewer.camera.positionCartographic.height;
        const zoomStep = Math.max(20.0, cameraHeight * 0.12);
        if (event.deltaY < 0) {
            viewer.camera.zoomIn(zoomStep);
        } else {
            viewer.camera.zoomOut(zoomStep);
        }
    }, { passive: false });

    // ── 初始化完成后，清除 Cesium 自动创建的默认图层，再统一添加 ──
    // 这样可以确保影像层和标注层的叠加顺序完全受控
    viewer.imageryLayers.removeAll();
    if (defaultMapType === 'tdt') {
        viewer.imageryLayers.addImageryProvider(createTdtProvider());
        viewer.imageryLayers.addImageryProvider(createTdtLabelProvider());
    } else {
        viewer.imageryLayers.addImageryProvider(createStreetProvider());
    }

    // ── 同步初始图层面板高亮状态 ─────────────────────────
    let currentMap = defaultMapType;
    if (defaultMapType !== 'tdt') {
        // Token 未填，回退 OSM 街道图，同步 UI 高亮
        document.getElementById('opt-tdt').classList.remove('active');
        document.getElementById('opt-street').classList.add('active');
    }

    // Android 通过该方法单向注入 Token，避免暴露 JS bridge getter
    function applyNativeTokens(cesiumToken, tdtToken) {
        if (typeof cesiumToken === 'string' && cesiumToken !== '') {
            CESIUM_ION_TOKEN = cesiumToken;
            Cesium.Ion.defaultAccessToken = CESIUM_ION_TOKEN;
            console.log('已应用原生 Cesium Token');
        }

        if (typeof tdtToken === 'string' && tdtToken !== '') {
            const hadNoTdtToken = !TDT_TOKEN;
            TDT_TOKEN = tdtToken;
            console.log('已应用原生天地图 Token');

            // 首次拿到天地图 token 时，自动切到天地图
            if (hadNoTdtToken && currentMap === 'street') {
                switchMap('tdt');
            }
        }
    }
    window.applyNativeTokens = applyNativeTokens;

    // ── 图层切换逻辑 ─────────────────────────────────────
    function switchMap(mapType) {
        closeLayerPanel();

        if (mapType === currentMap) return;

        // 天地图需要 Token
        if (mapType === 'tdt' && (!TDT_TOKEN || TDT_TOKEN === '')) {
            showInfo('⚠️ 当前未配置天地图 Token', 4000);
            return;
        }

        // 替换底图图层
        viewer.imageryLayers.removeAll();
        if (mapType === 'satellite') {
            viewer.imageryLayers.addImageryProvider(createSatelliteProvider());
        } else if (mapType === 'street') {
            viewer.imageryLayers.addImageryProvider(createStreetProvider());
        } else if (mapType === 'tdt') {
            viewer.imageryLayers.addImageryProvider(createTdtProvider());
            viewer.imageryLayers.addImageryProvider(createTdtLabelProvider());
        }

        // 更新选中样式
        ['satellite','street','tdt'].forEach(id => {
            document.getElementById(`opt-${id}`)
                .classList.toggle('active', id === mapType);
        });

        currentMap = mapType;
        const names = { satellite:'卫星影像', street:'街道地图', tdt:'天地图' };
        showInfo(`已切换至 ${names[mapType]}`, 1800);
    }

    // ── 图层面板开关 ──────────────────────────────────────
    let layerPanelOpen = false;

    function toggleLayerPanel() {
        layerPanelOpen = !layerPanelOpen;
        document.getElementById('layerPanel')
            .classList.toggle('show', layerPanelOpen);
    }

    function closeLayerPanel() {
        layerPanelOpen = false;
        document.getElementById('layerPanel').classList.remove('show');
    }

    // 点击地图其他区域时关闭面板
    document.getElementById('cesiumContainer').addEventListener('click', closeLayerPanel);

    // ── 定位相关变量 ──────────────────────────────────────
    let currentLocationMarker = null; // 实时当前位置（红色大点）
    let processMarkers = [];          // 轨迹节点（抽稀后的小点）
    let rawTrackPositions = [];       // 所有采样点（用于画线）
    let trackPoints = [];             // 结构化轨迹数据（导入导出使用）
    let sampledTrackPoints = [];      // 已绘制轨迹节点（经纬度）
    let trackLine = null;
    let isTracking = false;
    let showTrackNodes = true;

    const SLOW_MARKER_DISTANCE_METERS = 50;
    const FAST_MARKER_DISTANCE_METERS = 500;
    const FAST_SPEED_THRESHOLD_MPS = 8.0; // 约 28.8 km/h

    // 加载完成
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        logToAndroid('LocationMobile地图加载完成');
    }, 2000);

    // 初始视角：中国上空
    viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(105.0, 35.0, 5000000.0),
        orientation: { heading: 0.0, pitch: Cesium.Math.toRadians(-90.0), roll: 0.0 }
    });

    // ── 按钮功能 ──────────────────────────────────────────

    function requestLocation() {
        showInfo('正在获取位置…');
        if (typeof Android !== 'undefined' && Android.getLocation) {
            Android.getLocation();
        } else {
            showInfo('请在 LocationMobile 应用中使用此功能', 3000);
        }
    }

    function toggleLocationPanel() {
        document.getElementById('locationPanel').classList.toggle('collapsed');
    }

    function toggleTracking() {
        const btn = document.getElementById('trackBtn');
        if (!isTracking) {
            if (typeof Android !== 'undefined' && Android.startTracking) {
                Android.startTracking();
                resetTrackSession();
                isTracking = true;
                btn.textContent = '⏸️ 停止跟踪';
                btn.classList.add('tracking-on');
                setTrackNodePanelVisible(true);
                showInfo('开始位置跟踪', 2000);
            }
        } else {
            if (typeof Android !== 'undefined' && Android.stopTracking) {
                Android.stopTracking();
                isTracking = false;
                btn.textContent = '🎯 开始跟踪';
                btn.classList.remove('tracking-on');
                setTrackNodePanelVisible(false);
                showInfo('停止位置跟踪', 2000);
            }
        }
    }

    function clearMarkers() {
        // 移除单次/最新位置标记
        if (currentLocationMarker) {
            viewer.entities.remove(currentLocationMarker);
            currentLocationMarker = null;
        }
        // 移除所有轨迹节点
        processMarkers.forEach(e => viewer.entities.remove(e));
        processMarkers = [];
        // 移除轨迹线
        if (trackLine) { viewer.entities.remove(trackLine); trackLine = null; }
        rawTrackPositions = [];
        trackPoints = [];
        sampledTrackPoints = [];
        updateLocationPanel(null);
        showInfo('已清除所有标记', 2000);
        logToAndroid('清除所有标记');
    }

    function setTrackNodePanelVisible(visible) {
        document.getElementById('trackNodePanel').style.display = visible ? 'flex' : 'none';
    }

    function toggleTrackNodeVisibility() {
        showTrackNodes = document.getElementById('trackNodeSwitch').checked;
        processMarkers.forEach(marker => { marker.show = showTrackNodes; });
    }

    function resetTrackSession() {
        processMarkers.forEach(e => viewer.entities.remove(e));
        processMarkers = [];
        sampledTrackPoints = [];
        rawTrackPositions = [];
        trackPoints = [];
        if (trackLine) {
            viewer.entities.remove(trackLine);
            trackLine = null;
        }
    }

    function getSurfaceDistanceMeters(lon1, lat1, lon2, lat2) {
        const from = Cesium.Cartographic.fromDegrees(lon1, lat1);
        const to = Cesium.Cartographic.fromDegrees(lon2, lat2);
        const geodesic = new Cesium.EllipsoidGeodesic(from, to);
        return geodesic.surfaceDistance || 0;
    }

    function getMarkerDistanceThreshold(speedMps) {
        return speedMps >= FAST_SPEED_THRESHOLD_MPS
            ? FAST_MARKER_DISTANCE_METERS
            : SLOW_MARKER_DISTANCE_METERS;
    }

    function maybeAddProcessMarker(longitude, latitude, altitude, speedMps) {
        const threshold = getMarkerDistanceThreshold(speedMps);

        if (sampledTrackPoints.length === 0) {
            addProcessMarker(longitude, latitude, altitude);
            sampledTrackPoints.push({ longitude, latitude });
            return;
        }

        const lastPoint = sampledTrackPoints[sampledTrackPoints.length - 1];
        const distance = getSurfaceDistanceMeters(
            lastPoint.longitude,
            lastPoint.latitude,
            longitude,
            latitude
        );
        if (distance >= threshold) {
            addProcessMarker(longitude, latitude, altitude);
            sampledTrackPoints.push({ longitude, latitude });
        }
    }

    function addProcessMarker(longitude, latitude, altitude) {
        const marker = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(longitude, latitude, altitude),
            show: showTrackNodes,
            point: {
                pixelSize: 7,
                color: Cesium.Color.fromCssColorString('#38bdf8').withAlpha(0.85),
                outlineColor: Cesium.Color.WHITE,
                outlineWidth: 1.2
            }
        });
        processMarkers.push(marker);
    }

    // ── 位置更新与飞行 ────────────────────────────────────

    function normalizePoint(payload) {
        const longitude = Number(payload.longitude);
        const latitude = Number(payload.latitude);
        if (!Number.isFinite(longitude) || !Number.isFinite(latitude)) {
            return null;
        }
        const gpsAltitude = Number.isFinite(Number(payload.gpsAltitude))
            ? Number(payload.gpsAltitude)
            : null;
        const barometerAltitude = Number.isFinite(Number(payload.barometerAltitude))
            ? Number(payload.barometerAltitude)
            : null;
        return {
            longitude,
            latitude,
            gpsAltitude,
            barometerAltitude,
            accuracy: Number.isFinite(Number(payload.accuracy)) ? Number(payload.accuracy) : 0,
            speed: Number.isFinite(Number(payload.speed)) ? Number(payload.speed) : 0,
            timestamp: Number.isFinite(Number(payload.timestamp)) ? Number(payload.timestamp) : Date.now()
        };
    }

    function altitudeForCesium(point) {
        return Number.isFinite(point.gpsAltitude) ? point.gpsAltitude : 0;
    }

    function pointToCartesian(point) {
        return Cesium.Cartesian3.fromDegrees(
            point.longitude,
            point.latitude,
            altitudeForCesium(point)
        );
    }

    function formatMeters(value) {
        return Number.isFinite(value) ? `${value.toFixed(1)} 米` : '不可用';
    }

    function formatTimestamp(timestamp) {
        if (!Number.isFinite(timestamp) || timestamp <= 0) {
            return '--';
        }
        return new Date(timestamp).toLocaleTimeString('zh-CN', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
    }

    function updateLocationPanel(point) {
        const panel = document.getElementById('locationPanel');
        if (!point) {
            panel.classList.remove('show');
            return;
        }
        document.getElementById('valueLongitude').textContent = point.longitude.toFixed(6);
        document.getElementById('valueLatitude').textContent = point.latitude.toFixed(6);
        document.getElementById('valueGpsAltitude').textContent = formatMeters(point.gpsAltitude);
        document.getElementById('valueBarometerAltitude').textContent = formatMeters(point.barometerAltitude);
        document.getElementById('valueAccuracy').textContent = point.accuracy > 0 ? `±${point.accuracy.toFixed(0)} 米` : '--';
        document.getElementById('valueSpeed').textContent = `${(point.speed * 3.6).toFixed(1)} km/h`;
        document.getElementById('valueTimestamp').textContent = formatTimestamp(point.timestamp);
        panel.classList.add('show');
    }

    function upsertCurrentMarker(point, updateType) {
        const position = pointToCartesian(point);
        if (!currentLocationMarker) {
            currentLocationMarker = viewer.entities.add({
                name: '当前位置',
                position: position,
                point: {
                    pixelSize: updateType === 'single' ? 16 : 18,
                    color: Cesium.Color.fromCssColorString('#ff3b5c'),
                    outlineColor: Cesium.Color.WHITE,
                    outlineWidth: 3,
                    disableDepthTestDistance: Number.POSITIVE_INFINITY
                },
                label: {
                    text: updateType === 'single' ? '我的位置' : '当前位置',
                    font: updateType === 'single' ? '13pt sans-serif' : 'bold 13pt sans-serif',
                    fillColor: Cesium.Color.fromCssColorString('#ff3b5c'),
                    style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                    outlineColor: Cesium.Color.fromCssColorString('#0c1a2e'),
                    outlineWidth: 3,
                    verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                    pixelOffset: new Cesium.Cartesian2(0, -34),
                    disableDepthTestDistance: Number.POSITIVE_INFINITY
                },
                ellipse: {
                    show: point.accuracy > 0,
                    semiMinorAxis: Math.max(point.accuracy, 1),
                    semiMajorAxis: Math.max(point.accuracy, 1),
                    height: altitudeForCesium(point),
                    material: Cesium.Color.fromCssColorString('#ff3b5c').withAlpha(0.12),
                    outline: true,
                    outlineColor: Cesium.Color.fromCssColorString('#ff3b5c').withAlpha(0.5),
                    outlineWidth: 2
                }
            });
            return;
        }

        currentLocationMarker.position = position;
        currentLocationMarker.description = undefined;
        currentLocationMarker.point.pixelSize = updateType === 'single' ? 16 : 18;
        currentLocationMarker.label.text = updateType === 'single' ? '我的位置' : '当前位置';
        currentLocationMarker.ellipse.show = point.accuracy > 0;
        currentLocationMarker.ellipse.semiMinorAxis = Math.max(point.accuracy, 1);
        currentLocationMarker.ellipse.semiMajorAxis = Math.max(point.accuracy, 1);
        currentLocationMarker.ellipse.height = altitudeForCesium(point);
    }

    function appendTrackPoint(point) {
        trackPoints.push(point);
        rawTrackPositions.push(pointToCartesian(point));
        maybeAddProcessMarker(
            point.longitude,
            point.latitude,
            altitudeForCesium(point),
            point.speed
        );
        updateTrackLine();
    }

    function applyLocationUpdate(payload) {
        const point = normalizePoint(payload || {});
        if (!point) {
            showInfo('收到无效定位数据', 2500);
            return false;
        }
        const updateType = payload.updateType === 'single' ? 'single' : 'continuous';
        console.log(`位置更新: ${point.longitude}, ${point.latitude}, type=${updateType}`);
        updateLocationPanel(point);
        upsertCurrentMarker(point, updateType);

        if (updateType === 'continuous') {
            appendTrackPoint(point);
        }

        if (payload.shouldFly === true) {
            flyCameraToPoint(point, updateType);
        }

        if (updateType === 'single') {
            showInfo(
                `定位成功<br>` +
                `经度：${point.longitude.toFixed(5)}<br>` +
                `纬度：${point.latitude.toFixed(5)}<br>` +
                `精度：${point.accuracy > 0 ? `±${point.accuracy.toFixed(0)} 米` : '--'}`,
                4000
            );
        }
        return true;
    }

    function applyTrackBatch(payload) {
        const points = Array.isArray(payload && payload.points)
            ? payload.points.map(normalizePoint).filter(Boolean)
            : [];
        if (points.length === 0) {
            return false;
        }
        if (payload.replace === true) {
            resetTrackSession();
        }
        points.forEach(point => appendTrackPoint(point));
        const latest = points[points.length - 1];
        updateLocationPanel(latest);
        upsertCurrentMarker(latest, 'continuous');
        setTrackNodePanelVisible(true);
        showInfo(`已同步 ${points.length} 个轨迹点`, 1800);
        return true;
    }

    function flyCameraToPoint(point, updateType) {
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(
                point.longitude,
                point.latitude,
                altitudeForCesium(point) + (updateType === 'single' ? 500 : 300)
            ),
            orientation: {
                heading: Cesium.Math.toRadians(0.0),
                pitch: Cesium.Math.toRadians(-88.0),
                roll: 0.0
            },
            duration: updateType === 'single' ? 2.5 : 1.0
        });
    }

    // 兼容旧版原生调用，后续原生侧统一走 applyLocationUpdate。
    function flyToLocation(longitude, latitude, altitude, accuracy = 0, speed = 0, updateType = 'single') {
        return applyLocationUpdate({
            longitude,
            latitude,
            gpsAltitude: altitude,
            barometerAltitude: null,
            accuracy,
            speed,
            updateType,
            timestamp: Date.now(),
            shouldFly: updateType === 'single'
        });
    }

    /** 更新轨迹线 */
    function updateTrackLine() {
        if (rawTrackPositions.length < 2) {
            return;
        }
        if (trackLine) {
            return;
        }
        trackLine = viewer.entities.add({
            name: '移动轨迹',
            polyline: {
                positions: new Cesium.CallbackProperty(() => rawTrackPositions, false),
                width: 4,
                clampToGround: false,
                material: new Cesium.PolylineGlowMaterialProperty({
                    glowPower: 0.3,
                    color: Cesium.Color.fromCssColorString('#38bdf8')
                })
            }
        });
    }

    function exportTrack(format) {
        if (trackPoints.length === 0) {
            return '';
        }
        if (format === 'gpx') {
            return exportTrackAsGpx();
        }
        if (format === 'geojson') {
            return exportTrackAsGeoJson();
        }
        return '';
    }

    function xmlEscape(value) {
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');
    }

    function exportTrackAsGpx() {
        const pointXml = trackPoints.map(point => {
            const ele = Number.isFinite(point.gpsAltitude)
                ? `      <ele>${point.gpsAltitude.toFixed(2)}</ele>\n`
                : '';
            const time = `      <time>${new Date(point.timestamp).toISOString()}</time>\n`;
            const extensions = `      <extensions>\n` +
                `        <lm:barometerAltitude>${Number.isFinite(point.barometerAltitude) ? point.barometerAltitude.toFixed(2) : ''}</lm:barometerAltitude>\n` +
                `        <lm:accuracy>${point.accuracy.toFixed(2)}</lm:accuracy>\n` +
                `        <lm:speed>${point.speed.toFixed(3)}</lm:speed>\n` +
                `      </extensions>\n`;
            return `    <trkpt lat="${point.latitude.toFixed(8)}" lon="${point.longitude.toFixed(8)}">\n` +
                ele + time + extensions + `    </trkpt>`;
        }).join('\n');
        return `<?xml version="1.0" encoding="UTF-8"?>\n` +
            `<gpx version="1.1" creator="LocationMobile" xmlns="http://www.topografix.com/GPX/1/1" xmlns:lm="https://locationmobile.app/gpx/extensions">\n` +
            `  <trk>\n` +
            `    <name>${xmlEscape('LocationMobile Track')}</name>\n` +
            `    <trkseg>\n${pointXml}\n    </trkseg>\n` +
            `  </trk>\n` +
            `</gpx>\n`;
    }

    function exportTrackAsGeoJson() {
        const coordinates = trackPoints.map(point => {
            const coordinate = [point.longitude, point.latitude];
            if (Number.isFinite(point.gpsAltitude)) {
                coordinate.push(point.gpsAltitude);
            }
            return coordinate;
        });
        const properties = {
            source: 'LocationMobile',
            pointCount: trackPoints.length,
            points: trackPoints.map(point => ({
                timestamp: point.timestamp,
                gpsAltitude: point.gpsAltitude,
                barometerAltitude: point.barometerAltitude,
                accuracy: point.accuracy,
                speed: point.speed
            }))
        };
        return JSON.stringify({
            type: 'FeatureCollection',
            features: [{
                type: 'Feature',
                properties,
                geometry: {
                    type: 'LineString',
                    coordinates
                }
            }]
        }, null, 2);
    }

    window.applyLocationUpdate = applyLocationUpdate;
    window.applyTrackBatch = applyTrackBatch;
    window.exportTrack = exportTrack;

    /** 信息框 */
    function showInfo(message, duration = 0) {
        const box = document.getElementById('infoBox');
        box.innerHTML = message;
        box.classList.add('show');
        if (duration > 0) {
            setTimeout(() => box.classList.remove('show'), duration);
        }
    }

    /** Android 日志 */
    function logToAndroid(message) {
        if (typeof Android !== 'undefined' && Android.log) { Android.log(message); }
        console.log(message);
    }

    console.log('LocationMobile地图初始化完成');
    logToAndroid('LocationMobile地图初始化完成');
</script>
